<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>염버니 - 발로란트 로그인</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1923;
            color: #ece8e1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #1b2733;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .logo h1 { font-size: 24px; color: #ff4655; margin-bottom: 8px; }
        .logo p { font-size: 14px; color: #768a96; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #ff4655;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover { background: #d63040; }
        .notice {
            font-size: 12px;
            color: #768a96;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🐰 염버니봇</h1>
            <p>발로란트 계정 로그인</p>
        </div>

        <a class="btn" href="{{ auth_url }}">
            Riot 계정으로 로그인
        </a>

        <p class="notice">
            Riot Games 공식 로그인 페이지로 이동합니다.<br>
            비밀번호는 Riot 서버에서만 처리되며, 염버니는 비밀번호를 수집하지 않아요.
        </p>
    </div>
</body>
</html>
