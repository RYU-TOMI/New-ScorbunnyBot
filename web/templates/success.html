<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 성공</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1923;
            color: #ece8e1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #1b2733;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 22px; margin-bottom: 12px; color: #4ade80; }
        p { font-size: 14px; color: #768a96; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>로그인 성공!</h1>
        <p>디스코드로 돌아가서 /상점 명령어를 사용해보세요.</p>
        <p style="margin-top: 8px;">이 페이지는 닫아도 됩니다.</p>
    </div>
</body>
</html>
